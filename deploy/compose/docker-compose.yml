services:
  api:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.api
    container_name: kmap-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KMAP_HTTP_ADDR: :8080
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - kmap

  postgres:
    image: postgres:17-alpine
    container_name: kmap-postgres
    environment:
      POSTGRES_DB: kmap
      POSTGRES_USER: kmap
      POSTGRES_PASSWORD: kmap
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - kmap

  redis:
    image: redis:7.4-alpine
    container_name: kmap-redis
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - kmap

networks:
  kmap:
    name: kmap

volumes:
  postgres-data:
