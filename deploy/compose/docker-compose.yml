services:
  api:
    build:
      context: ../..
      dockerfile: deploy/compose/Dockerfile.api
    container_name: kmap-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KMAP_HTTP_ADDR: :8080
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - kmap

  postgres:
    image: postgres:17-alpine
    container_name: kmap-postgres
    environment:
      POSTGRES_DB: kmap
      POSTGRES_USER: kmap
      POSTGRES_PASSWORD: kmap
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - kmap

  redis:
    image: redis:7.4-alpine
    container_name: kmap-redis
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - kmap

  nominatim:
    image: mediagis/nominatim:5.2
    container_name: kmap-nominatim
    environment:
      PBF_URL: "${KMAP_NOMINATIM_PBF_URL:-https://download.geofabrik.de/europe/monaco-latest.osm.pbf}"
      REPLICATION_URL: "${KMAP_NOMINATIM_REPLICATION_URL:-https://download.geofabrik.de/europe/monaco-updates/}"
      IMPORT_WIKIPEDIA: "false"
      FREEZE: "true"
      THREADS: "2"
    ports:
      - "8081:8080"
    restart: unless-stopped
    shm_size: 1gb
    volumes:
      - nominatim-data:/var/lib/postgresql/16/main
      - nominatim-flatnode:/nominatim/flatnode
    networks:
      - kmap

networks:
  kmap:
    name: kmap

volumes:
  postgres-data:
  nominatim-data:
  nominatim-flatnode:
